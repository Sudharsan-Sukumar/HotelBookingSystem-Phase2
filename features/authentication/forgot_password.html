<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Elegant Enclave</title>
  <link rel='icon' type='image/png' href='../../assets/images/logo.png'>
  <meta name="description" content="Recover your Elegant Enclave hotel account credentials easily via secure OTP verification.">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="forgot_password.css">
</head>
<body class="forgot-password-page">

  <div class="container-fluid p-0 login-container">
    <div class="row g-0 min-vh-100">
      
      <!-- Left Panel (Salem Luxury Image Column) -->
      <div class="col-lg-5 d-none d-lg-block position-relative image-panel-column">
        <div class="image-panel" style="background-image: url('../../assets/images/forgot_hero.jpg');">
          <div class="curved-border-overlay"></div>
        </div>
      </div>
      
      <!-- Right Panel (Password Reset Form Column) -->
      <div class="col-lg-7 col-12 d-flex align-items-center justify-content-center form-panel-column bg-light-ivory">
        <div class="w-100 py-4 form-inner-wrapper">
          
          <!-- Back navigation options -->
          <div class="text-center mb-3">
            <a href="login.html" class="back-home-link">
              <i class="bi bi-arrow-left"></i> Back to Login
            </a>
          </div>

          <!-- Hero Heading -->
          <div class="text-center mb-4 px-3">
            <h1 class="login-hero-heading text-uppercase">Forgot Password</h1>
            <p class="login-hero-sub">Follow steps to recover your credentials</p>
          </div>

          <!-- Reset Card -->
          <div class="login-card mx-auto">
            
            <!-- Dynamic Alert Box for Success/Error Notification Messages -->
            <div id="statusAlert" class="alert d-none mb-3 small py-2 px-3 text-start" role="alert"></div>

            <form id="forgotPasswordForm" novalidate>
              
              <!-- Registered Email Section -->
              <div class="mb-3 text-start">
                <label for="resetEmail" class="form-label">Registered Email</label>
                <div class="input-container">
                  <input type="email" id="resetEmail" class="form-control" placeholder="Enter your email address" required>
                  <span class="invalid-feedback-msg" id="resetEmailError"></span>
                </div>
              </div>

              <!-- Send OTP Trigger -->
              <div class="mb-4">
                <button type="button" id="btnSendOTP" class="btn btn-login-submit w-100">Send OTP</button>
                <div class="text-center mt-2 small text-muted d-none" id="otpTimerContainer">
                  Resend OTP in <span id="otpCountdown" class="fw-bold text-dark">60</span> seconds
                </div>
              </div>

              <hr class="my-4" style="border-top: 1px dashed rgba(212, 175, 55, 0.3);">

              <!-- OTP Verification Code Input -->
              <div class="mb-3 text-start">
                <label for="otpCode" class="form-label">Enter OTP</label>
                <div class="input-container">
                  <input type="text" id="otpCode" class="form-control text-center fw-bold" placeholder="Verification code" maxlength="6" disabled required>
                  <span class="invalid-feedback-msg" id="otpCodeError"></span>
                </div>
              </div>

              <!-- New Password input -->
              <div class="mb-3 text-start">
                <label for="newPassword" class="form-label">New Password</label>
                <div class="input-container">
                  <input type="password" id="newPassword" class="form-control" placeholder="Enter new password" disabled required>
                  <span class="invalid-feedback-msg" id="newPasswordError"></span>
                </div>
              </div>

              <!-- Confirm Password input -->
              <div class="mb-3 text-start">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <div class="input-container">
                  <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm new password" disabled required>
                  <span class="invalid-feedback-msg" id="confirmPasswordError"></span>
                </div>
              </div>

              <!-- Show Password checkbox -->
              <div class="mb-4 form-check text-start d-flex align-items-center gap-2">
                <input type="checkbox" class="form-check-input" id="showPassword" disabled>
                <label class="form-check-label checkbox-label" for="showPassword">Show Password</label>
              </div>

              <!-- Reset Password button action -->
              <div>
                <button type="submit" id="btnResetPassword" class="btn btn-login-submit w-100" disabled>Reset Password</button>
              </div>

            </form>
          </div>

        </div>
      </div>

    </div>
  </div>

  <!-- JS bundle dependencies -->
  <script src="../../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  <script src="forgot_password.js"></script>
</body>
</html>
